<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - LinguaVerse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="bi bi-globe2"></i> LinguaVerse</a>
    </div>
  </nav>

  <div class="container py-4 quiz-container" id="quiz-content">
    <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Auth required');

    const quizId = new URLSearchParams(window.location.search).get('id');
    if (!quizId) window.location.href = 'courses.html';

    let quizData = null;
    let answers = {};
    let timerInterval = null;
    let timeLeft = 0;
    let startTime = 0;

    async function loadQuiz() {
      try {
        quizData = await API.get(`/quizzes/${quizId}`);

        // If user already passed this quiz, show result instead of quiz
        const passed = quizData.previous_attempts.find(a => a.passed);
        if (passed) {
          document.title = `${quizData.quiz.title} - LinguaVerse`;
          document.getElementById('quiz-content').innerHTML = `
            <div class="text-center py-5">
              <div class="display-1 mb-3">🏆</div>
              <h2>Already Passed!</h2>
              <p class="fs-5 text-muted">${quizData.quiz.title}</p>
              <p class="fs-4">Your score: <strong class="text-success">${passed.score}%</strong></p>
              <p class="text-muted">You passed this quiz on ${new Date(passed.attempted_at).toLocaleDateString()}. XP has already been awarded.</p>
              <div class="d-flex gap-3 justify-content-center mt-4 flex-wrap">
                <a href="courses.html" class="btn btn-primary btn-lg">Back to Courses</a>
                <a href="dashboard.html" class="btn btn-outline-secondary btn-lg">Dashboard</a>
              </div>
            </div>
          `;
          return;
        }

        timeLeft = quizData.quiz.time_limit_seconds;
        startTime = Date.now();
        renderQuiz();
        startTimer();
      } catch (err) {
        document.getElementById('quiz-content').innerHTML = `<div class="text-center"><h3>${err.message}</h3></div>`;
      }
    }

    function startTimer() {
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          submitQuiz();
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const el = document.getElementById('timer');
      if (el) {
        const min = Math.floor(timeLeft / 60);
        const sec = timeLeft % 60;
        el.textContent = `${min}:${sec.toString().padStart(2, '0')}`;
      }
    }

    function renderQuiz() {
      const { quiz, questions } = quizData;
      document.title = `${quiz.title} - LinguaVerse`;

      document.getElementById('quiz-content').innerHTML = `
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2>${quiz.title}</h2>
          <span class="quiz-timer"><i class="bi bi-clock"></i> <span id="timer"></span></span>
        </div>
        <p class="text-muted mb-4">${quiz.description || ''} · Pass score: ${quiz.passing_score}% · +${quiz.xp_reward} XP</p>

        ${questions.map((q, i) => `
          <div class="question-card" data-question="${q.id}">
            <h5>Question ${i + 1}</h5>
            <p class="fs-5 mb-3">${q.question_text}</p>
            ${q.options.map(o => `
              <button class="option-btn" data-question="${q.id}" data-option="${o.id}" onclick="selectOption(${q.id}, ${o.id}, this)">
                ${o.option_text}
              </button>
            `).join('')}
          </div>
        `).join('')}

        <div class="text-center mt-4">
          <button class="btn btn-primary btn-lg" onclick="submitQuiz()" id="submit-btn">
            <i class="bi bi-send"></i> Submit Quiz
          </button>
        </div>
      `;
    }

    function selectOption(questionId, optionId, btn) {
      answers[questionId] = optionId;
      const card = btn.closest('.question-card');
      card.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }

    async function submitQuiz() {
      if (timerInterval) clearInterval(timerInterval);

      const totalQuestions = quizData.questions.length;
      const answered = Object.keys(answers).length;

      if (answered < totalQuestions) {
        if (!confirm(`You answered ${answered}/${totalQuestions} questions. Submit anyway?`)) return;
      }

      const btn = document.getElementById('submit-btn');
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Grading...';
      }

      const timeTaken = Math.round((Date.now() - startTime) / 1000);

      try {
        const result = await API.post(`/quizzes/${quizId}/submit`, { answers, time_taken: timeTaken });
        renderResults(result);
      } catch (err) {
        showToast(err.message, 'danger');
      }
    }

    function renderResults(result) {
      document.getElementById('quiz-content').innerHTML = `
        <div class="text-center mb-4">
          <div class="display-1 mb-3">${result.passed ? '🎉' : '📚'}</div>
          <h2>${result.passed ? 'Congratulations!' : 'Keep Practicing!'}</h2>
          <p class="fs-4">Score: <strong class="${result.passed ? 'text-success' : 'text-danger'}">${result.score}%</strong> (${result.correct}/${result.total})</p>
          ${result.passed ? `<p class="text-success">${result.xp_earned > 0 ? `+${result.xp_earned} XP earned! Total: ${result.total_xp} XP` : `No XP awarded — you already earned XP for this quiz.`}</p>` : `<p class="text-muted">You need ${quizData.quiz.passing_score}% to pass. Try again!</p>`}
        </div>

        ${result.results.map((r, i) => `
          <div class="question-card">
            <h5>Question ${i + 1} ${r.is_correct ? '<i class="bi bi-check-circle-fill text-success"></i>' : '<i class="bi bi-x-circle-fill text-danger"></i>'}</h5>
            <p>${r.question_text}</p>
            ${r.options.map(o => `
              <div class="option-btn ${o.id === r.correct_answer ? 'correct' : ''} ${o.id === r.user_answer && !r.is_correct ? 'incorrect' : ''} ${o.id === r.user_answer ? 'selected' : ''}" style="cursor:default">
                ${o.option_text} ${o.is_correct ? ' ✓' : ''}
              </div>
            `).join('')}
          </div>
        `).join('')}

        <div class="text-center mt-4 d-flex gap-3 justify-content-center flex-wrap">
          ${!result.passed ? `<button class="btn btn-primary btn-lg" onclick="location.reload()"><i class="bi bi-arrow-repeat"></i> Retry Quiz</button>` : ''}
          <a href="courses.html" class="btn btn-outline-primary btn-lg">Back to Courses</a>
          <a href="dashboard.html" class="btn btn-outline-secondary btn-lg">Dashboard</a>
        </div>
      `;
    }

    loadQuiz();
  </script>
</body>
</html>
