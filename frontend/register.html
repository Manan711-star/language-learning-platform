<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your free LinguaVerse account. Start learning Spanish, French, German, Japanese, Italian, or Chinese with interactive courses and daily challenges.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://www.linguaverse.com/register.html">
  <title>Register - LinguaVerse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="text-center mb-4">
        <a href="index.html" class="navbar-brand fs-3"><i class="bi bi-globe2"></i> LinguaVerse</a>
        <h2 class="mt-3">Create Account</h2>
        <p class="text-muted">Start your language learning adventure</p>
      </div>

      <form id="register-form">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="full_name" placeholder="John Doe">
        </div>
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" id="username" placeholder="johndoe" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Min. 6 characters" required minlength="6">
        </div>
        <div class="mb-3">
          <label class="form-label">Target Language</label>
          <select class="form-select" id="target_language">
            <option value="Spanish">Spanish</option>
            <option value="French">French</option>
            <option value="German">German</option>
            <option value="Japanese">Japanese</option>
            <option value="Italian">Italian</option>
            <option value="Chinese">Chinese</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg" id="register-btn">
          <i class="bi bi-person-plus"></i> Create Account
        </button>
      </form>

      <div class="text-center mt-4">
        <p class="text-muted">Already have an account? <a href="login.html" class="text-decoration-none">Sign in</a></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = 'dashboard.html';

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Creating account...';

      try {
        const data = await API.post('/auth/register', {
          username: document.getElementById('username').value,
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
          full_name: document.getElementById('full_name').value,
          target_language: document.getElementById('target_language').value
        });
        setAuth(data.token, data.user);
        showToast('Account created! Redirecting to dashboard...');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch (err) {
        showToast(err.message, 'danger');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-person-plus"></i> Create Account';
      }
    });
  </script>
</body>
</html>
