<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Detail - LinguaVerse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="bi bi-globe2"></i> LinguaVerse</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
        </ul>
        <div id="auth-links">
          <a href="login.html" class="btn btn-outline-primary me-2">Login</a>
          <a href="register.html" class="btn btn-primary">Get Started</a>
        </div>
        <div id="user-menu" class="d-none dropdown">
          <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" data-bs-toggle="dropdown">
            <img src="assets/images/avatar-default.svg" alt="User" width="32" height="32" class="rounded-circle me-2 user-avatar">
            <span class="user-name">User</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a class="dropdown-item" href="profile.html"><i class="bi bi-person"></i> Profile</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <div id="course-content">
    <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    const courseId = new URLSearchParams(window.location.search).get('id');
    if (!courseId) window.location.href = 'courses.html';

    async function loadCourse() {
      try {
        const data = await API.get(`/courses/${courseId}`);
        const { course, lessons, quizzes } = data;

        document.title = `${course.title} - LinguaVerse`;
        document.getElementById('course-content').innerHTML = `
          <div class="page-header">
            <div class="container">
              <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                  <li class="breadcrumb-item"><a href="courses.html">Courses</a></li>
                  <li class="breadcrumb-item active">${course.title}</li>
                </ol>
              </nav>
              <div class="row align-items-center">
                <div class="col-md-8">
                  <span class="badge bg-primary me-2">${course.level}</span>
                  <span class="badge bg-primary">${course.language}</span>
                  <h1 class="mt-2">${course.title}</h1>
                  <p class="text-muted">${course.description}</p>
                  <div class="d-flex gap-3 text-muted">
                    <span><i class="bi bi-book"></i> ${course.total_lessons} lessons</span>
                    <span><i class="bi bi-clock"></i> ${course.duration_hours} hours</span>
                  </div>
                </div>
                <div class="col-md-4 text-center">
                  <img src="${course.image_url}" alt="${course.title}" width="200">
                </div>
              </div>
            </div>
          </div>

          <div class="container pb-5">
            <div class="row">
              <div class="col-lg-8">
                <h3 class="mb-3"><i class="bi bi-list-ol"></i> Lessons</h3>
                <div class="list-group mb-4">
                  ${lessons.map((l, i) => `
                    <a href="lesson.html?courseId=${courseId}&lessonId=${l.id}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                      <div>
                        <span class="badge bg-light text-dark me-2">${i + 1}</span>
                        <strong>${l.title}</strong>
                        <small class="text-muted d-block ms-5">+${l.xp_reward} XP</small>
                      </div>
                      ${l.completed ? '<i class="bi bi-check-circle-fill text-success fs-5"></i>' : '<i class="bi bi-chevron-right"></i>'}
                    </a>
                  `).join('')}
                </div>
              </div>
              <div class="col-lg-4">
                <div class="card p-4">
                  <h4><i class="bi bi-patch-question"></i> Quizzes</h4>
                  ${quizzes.length === 0 ? '<p class="text-muted">No quizzes yet.</p>' : quizzes.map(q => `
                    <div class="border rounded p-3 mb-2">
                      <strong>${q.title}</strong>
                      <p class="text-muted small mb-2">${q.description || ''}</p>
                      <div class="d-flex justify-content-between align-items-center">
                        <small><i class="bi bi-clock"></i> ${Math.floor(q.time_limit_seconds / 60)} min · Pass: ${q.passing_score}%</small>
                        <a href="quiz.html?id=${q.id}" class="btn btn-sm btn-primary">Take Quiz</a>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>
          </div>
        `;
      } catch (err) {
        document.getElementById('course-content').innerHTML = `
          <div class="container py-5 text-center">
            <h3>Course not found</h3>
            <a href="courses.html" class="btn btn-primary mt-3">Back to Courses</a>
          </div>`;
      }
    }

    loadCourse();
  </script>
</body>
</html>
