<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - LinguaVerse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="bi bi-globe2"></i> LinguaVerse</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card p-4">
          <div class="text-center mb-4">
            <div class="avatar-upload d-inline-block position-relative mb-3">
              <img src="assets/images/avatar-default.svg" alt="Avatar" width="100" height="100" class="rounded-circle" id="avatar">
              <label for="avatar-input" class="avatar-edit-btn" title="Change profile photo">
                <i class="bi bi-camera"></i>
              </label>
              <input type="file" id="avatar-input" accept="image/jpeg,image/png,image/gif,image/webp" class="d-none">
            </div>
            <p class="text-muted small mb-2" id="avatar-hint">JPEG, PNG, GIF, or WebP · max 2MB</p>
            <h2 id="profile-name">Loading...</h2>
            <p class="text-muted" id="profile-email"></p>
            <div class="d-flex justify-content-center gap-2 mt-2">
              <span class="xp-badge" id="profile-xp">0 XP</span>
              <span class="streak-badge" id="profile-streak">0 day streak</span>
            </div>
          </div>

          <form id="profile-form">
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" id="full_name">
            </div>
            <div class="mb-3">
              <label class="form-label">Native Language</label>
              <input type="text" class="form-control" id="native_language">
            </div>
            <div class="mb-3">
              <label class="form-label">Target Language</label>
              <select class="form-select" id="target_language">
                <option value="Spanish">Spanish</option>
                <option value="French">French</option>
                <option value="German">German</option>
                <option value="Japanese">Japanese</option>
                <option value="Italian">Italian</option>
                <option value="Chinese">Chinese</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" id="username" disabled>
            </div>
            <div class="mb-3">
              <label class="form-label">Member Since</label>
              <input type="text" class="form-control" id="member_since" disabled>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="save-btn">
              <i class="bi bi-save"></i> Save Changes
            </button>
          </form>
        </div>

        <div class="card p-4 mt-4">
          <h4><i class="bi bi-trophy"></i> Leaderboard</h4>
          <div id="leaderboard">
            <div class="text-center py-3"><div class="spinner-border text-primary"></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Auth required');

    async function loadProfile() {
      try {
        const user = await API.get('/auth/profile');
        document.getElementById('profile-name').textContent = user.full_name || user.username;
        document.getElementById('profile-email').textContent = user.email;
        document.getElementById('profile-xp').innerHTML = `<i class="bi bi-star-fill"></i> ${user.xp_points} XP`;
        document.getElementById('profile-streak').innerHTML = `
          <i class="bi bi-fire"></i> ${user.streak_days} day${user.streak_days !== 1 ? 's' : ''} 
          <span style="opacity:0.7;font-size:0.85em">(best: ${user.max_streak_days || 0})</span>
        `;
        const avatarEl = document.getElementById('avatar');
        if (user.avatar_url) {
          avatarEl.src = user.avatar_url.startsWith('uploads/')
            ? `/${user.avatar_url}?t=${Date.now()}`
            : user.avatar_url;
        } else {
          avatarEl.src = 'assets/images/avatar-default.svg';
        }
        avatarEl.onerror = function() { this.src = 'assets/images/avatar-default.svg'; this.onerror = null; };
        document.getElementById('full_name').value = user.full_name || '';
        document.getElementById('native_language').value = user.native_language || '';
        document.getElementById('target_language').value = user.target_language || 'Spanish';
        document.getElementById('username').value = user.username;
        document.getElementById('member_since').value = new Date(user.created_at).toLocaleDateString();
        updateNavbar();
      } catch (err) {
        showToast(err.message, 'danger');
      }
    }

    // Holds the selected file until Save Changes is clicked
    let pendingAvatarFile = null;
    let pendingAvatarPreviewUrl = null;

    document.getElementById('avatar-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 2 * 1024 * 1024) {
        showToast('Image must be smaller than 2MB.', 'danger');
        e.target.value = '';
        return;
      }

      // Revoke previous preview URL if any
      if (pendingAvatarPreviewUrl) URL.revokeObjectURL(pendingAvatarPreviewUrl);

      pendingAvatarFile = file;
      pendingAvatarPreviewUrl = URL.createObjectURL(file);
      document.getElementById('avatar').src = pendingAvatarPreviewUrl;
      document.getElementById('avatar-hint').textContent = 'Photo selected — click Save Changes to apply.';
    });

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('save-btn');
      btn.disabled = true;

      try {
        // Upload avatar first if a new one was selected
        if (pendingAvatarFile) {
          const formData = new FormData();
          formData.append('avatar', pendingAvatarFile);
          const uploaded = await API.upload('/auth/profile/avatar', formData);
          const user = getUser();
          user.avatar_url = uploaded.avatar_url;
          localStorage.setItem('user', JSON.stringify(user));
          document.getElementById('avatar').src = `/${uploaded.avatar_url}?t=${Date.now()}`;
          URL.revokeObjectURL(pendingAvatarPreviewUrl);
          pendingAvatarFile = null;
          pendingAvatarPreviewUrl = null;
          document.getElementById('avatar-hint').textContent = 'JPEG, PNG, GIF, or WebP · max 2MB';
        }

        // Save profile fields
        const updated = await API.put('/auth/profile', {
          full_name: document.getElementById('full_name').value,
          native_language: document.getElementById('native_language').value,
          target_language: document.getElementById('target_language').value
        });
        const user = getUser();
        user.full_name = updated.full_name;
        user.target_language = updated.target_language;
        localStorage.setItem('user', JSON.stringify(user));
        showToast('Profile updated successfully!');
        loadProfile();
      } catch (err) {
        showToast(err.message, 'danger');
      } finally {
        btn.disabled = false;
      }
    });

    async function loadLeaderboard() {
      try {
        const leaders = await API.get('/progress/leaderboard');
        document.getElementById('leaderboard').innerHTML = leaders.map((l, i) => {
          const avatarSrc = l.avatar_url 
            ? (l.avatar_url.startsWith('uploads/') ? `/${l.avatar_url}` : l.avatar_url)
            : 'assets/images/avatar-default.svg';
          return `
          <div class="leaderboard-item">
            <div class="leaderboard-rank ${i < 3 ? 'rank-' + (i+1) : 'rank-default'}">${i + 1}</div>
            <img src="${avatarSrc}" alt="" width="40" height="40" class="rounded-circle me-3" onerror="this.src='assets/images/avatar-default.svg'; this.onerror=null;">
            <div class="flex-grow-1">
              <strong>${l.full_name || l.username}</strong>
              <small class="text-muted d-block">
                ${l.xp_points} XP · 🔥 ${l.streak_days} 
                ${l.max_streak_days > l.streak_days ? `(max ${l.max_streak_days})` : ''}
              </small>
            </div>
          </div>
        `;
        }).join('');
      } catch (err) {
        document.getElementById('leaderboard').innerHTML = '<p class="text-muted">Could not load leaderboard.</p>';
      }
    }

    loadProfile();
    loadLeaderboard();
  </script>
</body>
</html>
