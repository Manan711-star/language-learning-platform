<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your LinguaVerse account to continue your language learning journey. Track progress, earn achievements, and complete daily challenges.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://www.linguaverse.com/login.html">
  <title>Login - LinguaVerse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="text-center mb-4">
        <a href="index.html" class="navbar-brand fs-3"><i class="bi bi-globe2"></i> LinguaVerse</a>
        <h2 class="mt-3">Welcome Back!</h2>
        <p class="text-muted">Sign in to continue your learning journey</p>
      </div>

      <form id="login-form">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
          <div class="text-end mt-1">
            <a href="forgot-password.html" class="text-decoration-none small" style="color: var(--primary);">Forgot password?</a>
          </div>
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="remember">
          <label class="form-check-label" for="remember">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg" id="login-btn">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>

      <div class="text-center mt-4">
        <p class="text-muted">Don't have an account? <a href="register.html" class="text-decoration-none">Register here</a></p>
      </div>

      <div class="alert alert-info mt-3 small">
        <strong>Demo:</strong> Register a new account or use any credentials after registering.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = 'dashboard.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Signing in...';

      try {
        const data = await API.post('/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        setAuth(data.token, data.user);
        showToast('Login successful! Redirecting...');
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } catch (err) {
        showToast(err.message, 'danger');
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
      }
    });
  </script>
</body>
</html>
