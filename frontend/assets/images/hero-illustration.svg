<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" fill="none">
  <!-- Background -->
  <rect width="500" height="400" fill="#6366f1" opacity="0.1" rx="20"/>
  
  <!-- Globe -->
  <circle cx="250" cy="180" r="80" fill="#6366f1" opacity="0.2"/>
  <circle cx="250" cy="180" r="60" fill="#6366f1" opacity="0.3"/>
  <circle cx="250" cy="180" r="40" fill="#6366f1" opacity="0.5"/>
  
  <!-- Globe icon -->
  <text x="250" y="200" text-anchor="middle" font-size="48" fill="#6366f1" font-family="Arial, sans-serif">🌍</text>
  
  <!-- Language cards -->
  <rect x="100" y="280" width="80" height="60" rx="10" fill="#10b981" opacity="0.8"/>
  <text x="140" y="315" text-anchor="middle" font-size="24" fill="white" font-weight="bold">A</text>
  
  <rect x="210" y="260" width="80" height="80" rx="10" fill="#6366f1" opacity="0.9"/>
  <text x="250" y="310" text-anchor="middle" font-size="32" fill="white" font-weight="bold">文</text>
  
  <rect x="320" y="280" width="80" height="60" rx="10" fill="#f59e0b" opacity="0.8"/>
  <text x="360" y="315" text-anchor="middle" font-size="24" fill="white" font-weight="bold">あ</text>
  
  <!-- Connection lines -->
  <path d="M150 250 Q250 220 350 250" stroke="#8b5cf6" stroke-width="3" fill="none" stroke-dasharray="8 4"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="8" fill="#10b981" opacity="0.6"/>
  <circle cx="400" cy="120" r="12" fill="#f59e0b" opacity="0.5"/>
  <circle cx="420" cy="200" r="6" fill="#6366f1" opacity="0.7"/>
  <circle cx="80" cy="220" r="10" fill="#8b5cf6" opacity="0.6"/>
  
  <!-- Text -->
  <text x="250" y="370" text-anchor="middle" font-size="18" fill="#6366f1" font-family="sans-serif" font-weight="500">Learn Languages Globally</text>
</svg>
