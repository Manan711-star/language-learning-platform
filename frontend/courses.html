  <meta property="twitter:description" content="Browse all language courses. Choose from 6 languages and start your learning journey today.">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

</head>
<body>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="courses.html">Courses</a></li>
          <li class="nav-item"><a class="nav-link" href="challenges.html">Challenges</a></li>
        </ul>

          <a href="login.html" class="btn btn-outline-primary me-2">Login</a>
          <a href="register.html" class="btn btn-primary">Get Started</a>

          <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" data-bs-toggle="dropdown">

  </nav>

  <div class="page-header">
    <div class="container">
      <h1 class="section-title">Language Courses</h1>
      <p class="text-muted mb-0">Choose a language and start learning today</p>
    </div>
  </div>

  <div class="container pb-5">
    <div class="row g-3 mb-4">
      <div class="col-12 col-md-6">
        <input type="text" class="form-control" id="search" placeholder="Search courses...">
      </div>
      <div class="col-6 col-md-3">
        <select class="form-select" id="filter-level">
          <option value="">All Levels</option>
          <option value="Beginner">Beginner</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Advanced">Advanced</option>
        </select>
      </div>
      <div class="col-6 col-md-3">
        <select class="form-select" id="filter-language">
          <option value="">All Languages</option>
          <option value="Spanish">Spanish</option>
          <option value="French">French</option>
          <option value="German">German</option>
          <option value="Japanese">Japanese</option>
          <option value="Italian">Italian</option>
          <option value="Chinese">Chinese</option>
        </select>
      </div>
    </div>

    <div class="row g-4" id="courses-grid">
      <div class="col-12 text-center py-5"><div class="spinner-border text-primary"></div></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="js/api.js"></script>
  <script>
    let allCourses = [];

    async function loadCourses() {
      try {
        allCourses = await API.get('/courses');
        renderCourses(allCourses);
      } catch (err) {
        document.getElementById('courses-grid').innerHTML = `
          <div class="col-12 empty-state">
            <i class="bi bi-exclamation-circle"></i>
            <h4>Could not load courses</h4>
            <p>Make sure the server is running and the database is set up.</p>
          </div>`;
      }
    }

    function renderCourses(courses) {
      const grid = document.getElementById('courses-grid');
      if (courses.length === 0) {
        grid.innerHTML = '<div class="col-12 empty-state"><i class="bi bi-search"></i><h4>No courses found</h4></div>';
        return;
      }

      grid.innerHTML = courses.map(c => `
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card course-card h-100">
            <img src="${c.image_url}" class="card-img-top" alt="${c.title}">
            <div class="card-body">
              
              <h5 class="card-title">${c.title}</h5>
              <p class="card-text text-muted small">${c.description.substring(0, 100)}...</p>
              ${c.progress_percent !== undefined ? `
                <div class="progress mb-2" style="height:6px">
                  <div class="progress-bar" style="width:${c.progress_percent}%"></div>
                </div>
                <small class="text-muted">${c.progress_percent}% complete</small>
              ` : ''}
            </div>
            <div class="card-footer bg-white border-0 d-flex justify-content-between align-items-center">
              <small class="text-muted"><i class="bi bi-book"></i> ${c.total_lessons} lessons · ${c.duration_hours}h</small>
              <a href="course-detail.html?id=${c.id}" class="btn btn-primary btn-sm">View Course</a>
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterCourses() {
      const search = document.getElementById('search').value.toLowerCase();
      const level = document.getElementById('filter-level').value;
      const language = document.getElementById('filter-language').value;

      const filtered = allCourses.filter(c => {
        const matchSearch = c.title.toLowerCase().includes(search) || c.description.toLowerCase().includes(search);
        const matchLevel = !level || c.level === level;
        const matchLang = !language || c.language === language;
        return matchSearch && matchLevel && matchLang;
      });
      renderCourses(filtered);
    }

    document.getElementById('search').addEventListener('input', filterCourses);
    document.getElementById('filter-level').addEventListener('change', filterCourses);
    document.getElementById('filter-language').addEventListener('change', filterCourses);

    loadCourses();
  </script>
</body>
</html>
