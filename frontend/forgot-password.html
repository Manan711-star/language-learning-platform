<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset your LinguaVerse account password.">
  <meta name="robots" content="noindex, nofollow">
  <title>Forgot Password - LinguaVerse</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="text-center mb-4">
        <a href="index.html" class="navbar-brand fs-3"><i class="bi bi-globe2"></i> LinguaVerse</a>
        <h2 class="mt-3">Forgot Password?</h2>
        <p class="text-muted">Enter your email and we'll send you a reset link</p>
      </div>

      <!-- Request form -->
      <form id="forgot-form">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="you@example.com" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg" id="submit-btn">
          <i class="bi bi-envelope"></i> Send Reset Link
        </button>
      </form>

      <!-- Success state (hidden until form submitted) -->
      <div id="success-state" class="d-none text-center">
        <div class="mb-3" style="font-size: 3.5rem; line-height: 1;">
          <i class="bi bi-envelope-check" style="color: var(--secondary);"></i>
        </div>
        <h5 class="fw-bold">Check your inbox</h5>
        <p class="text-muted small">If an account exists for <strong id="sent-email"></strong>, a reset link has been sent. It expires in <strong>1 hour</strong>.</p>
        <p class="text-muted small">Don't see it? Check your spam folder.</p>
        <button id="resend-btn" class="btn btn-outline-secondary btn-sm mt-2" disabled>
          Resend in <span id="countdown">60</span>s
        </button>
      </div>

      <div class="text-center mt-4">
        <a href="login.html" class="text-decoration-none text-muted small">
          <i class="bi bi-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = 'dashboard.html';

    const form       = document.getElementById('forgot-form');
    const submitBtn  = document.getElementById('submit-btn');
    const successDiv = document.getElementById('success-state');
    const sentEmail  = document.getElementById('sent-email');
    const resendBtn  = document.getElementById('resend-btn');
    const countdown  = document.getElementById('countdown');

    let lastEmail = '';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      await sendRequest(document.getElementById('email').value.trim());
    });

    resendBtn.addEventListener('click', () => sendRequest(lastEmail));

    async function sendRequest(email) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Sending...';

      try {
        console.log('Sending forgot-password request for:', email);
        await API.post('/auth/forgot-password', { email });
        console.log('Success!');
        lastEmail = email;
        sentEmail.textContent = email;

        form.classList.add('d-none');
        successDiv.classList.remove('d-none');
        startCountdown();
      } catch (err) {
        console.error('Forgot password failed:', err);
        alert('Error: ' + err.message);
        showToast(err.message, 'danger');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-envelope"></i> Send Reset Link';
      }
    }

    function startCountdown() {
      let secs = 60;
      resendBtn.disabled = true;
      countdown.textContent = secs;

      const timer = setInterval(() => {
        secs--;
        countdown.textContent = secs;
        if (secs <= 0) {
          clearInterval(timer);
          resendBtn.disabled = false;
          resendBtn.textContent = 'Resend email';
        }
      }, 1000);
    }
  </script>
</body>
</html>
